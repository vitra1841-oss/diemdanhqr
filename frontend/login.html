<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - Điểm danh QR</title>
  <link rel="icon" type="image/png" href="assets/TNTT.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap" rel="stylesheet" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Điểm Danh QR">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Điểm Danh QR">
  <meta name="theme-color" content="#1f1d16">
</head>

<body>
  <div id="pullIndicator" class="pull-indicator">↓ Kéo để tải lại</div>
  <div class="title">
    <span class="title-sub">Xứ Đoàn Đức Mẹ Vô Nhiễm</span>
    <span class="title-main">Điểm Danh QR</span>
    <img src="assets/TNTT.png" alt="Logo TNTT" class="logo-login" />
  </div>

  <div class="login-box">
    <h2 class="login-title">ĐĂNG NHẬP</h2>
    <div id="errorBanner" class="login-error-banner" style="display:none;">
      ⚠️ Email của bạn chưa được cấp quyền truy cập. Liên hệ admin để được thêm vào danh sách.
    </div>
    <button class="google-btn" onclick="window.location.href='/auth/login'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
          fill="#4285F4" />
        <path
          d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
          fill="#34A853" />
        <path
          d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
          fill="#FBBC05" />
        <path
          d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
          fill="#EA4335" />
      </svg>
      Đăng nhập với Google
    </button>

    <div class="divider">
      <span>Hoặc đăng nhập bằng</span>
    </div>

    <div class="input-group">
      <input type="text" id="username" placeholder=" " autocomplete="off" />
      <label for="username">Tên đăng nhập</label>
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder=" " />
      <label for="password">Mật khẩu</label>
      <button type="button" class="toggle-pwd" onclick="togglePassword()">
        <svg id="eyeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </button>
    </div>

    <button class="start-btn login-btn">Đăng nhập</button>
    <a class="forgot-pwd-inline">Quên mật khẩu?</a>

  </div>
  <script src="js/login.js"></script>
</body>

</html>
