<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản trị - Điểm Danh QR</title>
  <link rel="icon" type="image/png" href="assets/TNTT.png" />
  <link rel="stylesheet" href="css/adminpanel.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap" rel="stylesheet" />
</head>

<body>
  <div id="loginScreen">
    <div class="login-box">
      <h2 class="login-title">QUẢN TRỊ</h2>
      <p id="errorMsg" class="error-msg">Sai tên đăng nhập hoặc mật khẩu</p>

      <div class="input-group">
        <input type="text" id="username" placeholder=" " autocomplete="off" />
        <label for="username">Tên đăng nhập</label>
      </div>

      <div class="input-group">
        <input type="password" id="password" placeholder=" " />
        <label for="password">Mật khẩu</label>
        <button type="button" class="toggle-pwd" onclick="togglePassword()" aria-label="Hiện hoặc ẩn mật khẩu" title="Hiện hoặc ẩn mật khẩu">
          <span class="sr-only">Hiện hoặc ẩn mật khẩu</span>
          <svg id="eyeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>

      <button class="start-btn login-btn" onclick="doLogin()">Đăng nhập</button>
    </div>
  </div>

  <div id="adminScreen">
    <div class="header">
      <div class="header-left">
        <h1>Quản trị</h1>
        <span class="role-badge developer">DEVELOPER</span>
      </div>
      <button class="logout-btn" onclick="doLogout()">Đăng xuất</button>
    </div>

    <div class="card">
      <div class="card-title">Thêm người dùng</div>
      <div class="add-form">
        <input type="email" id="newEmail" placeholder="email@gmail.com" />
        <input type="text" id="newName" placeholder="Họ và tên" />
        <select id="newRole" aria-label="Chọn vai trò người dùng" title="Chọn vai trò người dùng">
          <option value="user">user</option>
          <option value="admin">admin</option>
        </select>
        <button class="btn btn-primary" onclick="addUser()">Thêm</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Danh sách người dùng</div>
      <div id="tableWrap">
        <div class="loading">Đang tải...</div>
      </div>
    </div>
  </div>

  <div class="notify" id="notify"></div>

  <script src="js/admin.js"></script>
</body>

</html>
