<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản trị - Điểm Danh QR</title>
    <link rel="icon" type="image/png" href="TNTT.png" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1a1a1a;
        color: #e0e0e0;
        min-height: 100vh;
        padding: 24px 16px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .header h1 { font-size: 20px; font-weight: 600; }

      .role-badge {
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 4px;
        letter-spacing: 1px;
        font-weight: 600;
      }
      .role-badge.developer { background: #2d1f4e; color: #b07fff; border: 1px solid #6a3fbb; }
      .role-badge.admin     { background: #1f3a2d; color: #4ade80; border: 1px solid #2d6a4a; }

      .logout-btn {
        background: none;
        border: 1px solid #444;
        color: #aaa;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      .logout-btn:hover { border-color: #666; color: #ddd; }

      .card {
        background: #242424;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 16px;
      }

      /* Add user form */
      .add-form {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .add-form input {
        flex: 1;
        min-width: 180px;
        background: #1a1a1a;
        border: 1px solid #444;
        border-radius: 8px;
        padding: 10px 14px;
        color: #e0e0e0;
        font-size: 14px;
        outline: none;
      }
      .add-form input:focus { border-color: #666; }
      .add-form input::placeholder { color: #555; }

      .add-form select {
        background: #1a1a1a;
        border: 1px solid #444;
        border-radius: 8px;
        padding: 10px 14px;
        color: #e0e0e0;
        font-size: 14px;
        outline: none;
        cursor: pointer;
      }

      .btn {
        padding: 10px 18px;
        border-radius: 8px;
        border: none;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .btn:hover { opacity: 0.85; }
      .btn:disabled { opacity: 0.4; cursor: not-allowed; }

      .btn-primary { background: #4f46e5; color: white; }
      .btn-danger  { background: #dc2626; color: white; padding: 6px 12px; font-size: 13px; }
      .btn-ghost   { background: #333; color: #ccc; padding: 6px 12px; font-size: 13px; }

      /* User table */
      .user-table { width: 100%; border-collapse: collapse; }
      .user-table th {
        text-align: left;
        font-size: 12px;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 8px 12px;
        border-bottom: 1px solid #333;
      }
      .user-table td {
        padding: 12px 12px;
        border-bottom: 1px solid #2a2a2a;
        font-size: 14px;
      }
      .user-table tr:last-child td { border-bottom: none; }

      .role-select {
        background: #1a1a1a;
        border: 1px solid #444;
        border-radius: 6px;
        padding: 4px 8px;
        color: #e0e0e0;
        font-size: 13px;
        cursor: pointer;
      }

      .tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 500;
      }
      .tag.admin     { background: #1f3a2d; color: #4ade80; }
      .tag.user      { background: #1f2937; color: #93c5fd; }
      .tag.developer { background: #2d1f4e; color: #b07fff; }

      .notify {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: #333;
        color: #e0e0e0;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 14px;
        transition: transform 0.3s ease;
        z-index: 999;
        white-space: nowrap;
      }
      .notify.show { transform: translateX(-50%) translateY(0); }

      .loading { color: #666; font-size: 14px; padding: 12px 0; }
      .empty   { color: #555; font-size: 14px; padding: 12px 0; }
    </style>
  </head>
  <body>
    <div class="header">
      <div style="display:flex;align-items:center;gap:12px">
        <h1>Quản trị</h1>
        <span class="role-badge" id="roleBadge"></span>
      </div>
      <button class="logout-btn" onclick="logout()">Đăng xuất</button>
    </div>

    <!-- Thêm user -->
    <div class="card">
      <div class="card-title">Thêm người dùng</div>
      <div class="add-form">
        <input type="email" id="newEmail" placeholder="email@gmail.com" />
        <select id="newRole">
          <option value="user">user</option>
          <option value="admin">admin</option>
        </select>
        <button class="btn btn-primary" onclick="addUser()">Thêm</button>
      </div>
    </div>

    <!-- Danh sách user -->
    <div class="card">
      <div class="card-title">Danh sách người dùng</div>
      <div id="tableWrap">
        <div class="loading">Đang tải...</div>
      </div>
    </div>

    <div class="notify" id="notify"></div>

    <script>
      let currentRole = "";

      async function init() {
        const me = await fetch("/api/me").then(r => r.json());
        currentRole = me.role;

        const badge = document.getElementById("roleBadge");
        badge.textContent = me.role.toUpperCase();
        badge.className = "role-badge " + me.role;

        // Ẩn option admin nếu không phải developer
        if (me.role !== "developer") {
          document.querySelector("#newRole option[value='admin']").remove();
        }

        loadUsers();
      }

      async function loadUsers() {
        const wrap = document.getElementById("tableWrap");
        try {
          const res = await fetch("/api/admin/users");
          const data = await res.json();

          if (!data.users || data.users.length === 0) {
            wrap.innerHTML = '<div class="empty">Chưa có người dùng nào</div>';
            return;
          }

          let rows = data.users.map(u => {
            const canEdit = currentRole === "developer" || u.role !== "admin";
            const roleCell = canEdit
              ? `<select class="role-select" onchange="updateRole('${u.email}', this.value, this)">
                   <option value="user"  ${u.role === "user"  ? "selected" : ""}>user</option>
                   <option value="admin" ${u.role === "admin" ? "selected" : ""}>admin</option>
                 </select>`
              : `<span class="tag ${u.role}">${u.role}</span>`;

            const delBtn = canEdit
              ? `<button class="btn btn-danger" onclick="removeUser('${u.email}', '${u.role}', this)">Xóa</button>`
              : `<span style="color:#444;font-size:12px">—</span>`;

            return `<tr>
              <td>${u.email}</td>
              <td>${roleCell}</td>
              <td>${delBtn}</td>
            </tr>`;
          }).join("");

          wrap.innerHTML = `
            <table class="user-table">
              <thead><tr>
                <th>Email</th><th>Role</th><th></th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>`;
        } catch (err) {
          wrap.innerHTML = '<div class="empty">Lỗi tải danh sách</div>';
        }
      }

      async function addUser() {
        const email = document.getElementById("newEmail").value.trim();
        const role  = document.getElementById("newRole").value;
        if (!email) { showNotify("⚠️ Nhập email trước"); return; }

        const res = await fetch("/api/admin/users", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, role }),
        });
        const data = await res.json();
        if (data.success) {
          document.getElementById("newEmail").value = "";
          showNotify("✅ Đã thêm " + email);
          loadUsers();
        } else {
          showNotify("❌ " + (data.error || "Lỗi không xác định"));
        }
      }

      async function removeUser(email, role, btn) {
        if (!confirm("Xóa " + email + "?")) return;
        btn.disabled = true;

        const res = await fetch("/api/admin/users", {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, role }),
        });
        const data = await res.json();
        if (data.success) {
          showNotify("🗑️ Đã xóa " + email);
          loadUsers();
        } else {
          showNotify("❌ " + (data.error || "Lỗi không xác định"));
          btn.disabled = false;
        }
      }

      async function updateRole(email, role, select) {
        select.disabled = true;
        const res = await fetch("/api/admin/users", {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, role }),
        });
        const data = await res.json();
        if (data.success) {
          showNotify("✅ Đã đổi role " + email + " → " + role);
        } else {
          showNotify("❌ " + (data.error || "Lỗi không xác định"));
        }
        select.disabled = false;
      }

      function showNotify(msg) {
        const el = document.getElementById("notify");
        el.textContent = msg;
        el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 2500);
      }

      async function logout() {
        // Xóa session cookie bằng cách set expired
        document.cookie = "session=; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; SameSite=None; Secure";
        window.location.href = "/admin/login";
      }

      init();
    </script>
  </body>
</html>
